apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cilium-lab-apps
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Moon-5070/cilium-network-automation.git
    targetRevision: main
    path: apps
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
