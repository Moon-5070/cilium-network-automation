name: Validate Cilium Network Automation

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate-yaml:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Validate YAML syntax
      run: |
        python3 - <<'EOF'
        import glob
        import yaml

        files = glob.glob("apps/*.yaml") + glob.glob("policies/*.yaml")
        for file in files:
            print(f"Checking {file}")
            with open(file) as f:
                list(yaml.safe_load_all(f))

        print("YAML syntax OK")
        EOF
